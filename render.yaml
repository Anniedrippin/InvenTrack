services:
  - type: web
    name: inventory-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: inventory-db
    databaseName: inventory_db
    user: inventory_user
    plan: free
    region: oregon
